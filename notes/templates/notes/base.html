<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Фіолетові Нотатки</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f0f7;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4a154b; /* Глибокий фіолетовий */
            color: #ffffff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffcc00; /* Жовтий акцент */
        }
        header a, .btn-logout {
            color: #ffcc00;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-logout {
            background: none;
            border: 2px solid #ffcc00;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background-color: #ffcc00;
            color: #4a154b;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<header>
    <h2>💜 Завдання: Нотатки</h2>
    <div>
        {% if user.is_authenticated %}
            <span style="margin-right: 15px;">Привіт, <strong>{{ user.username }}</strong>!</span>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn-logout">Вийти (Log Out)</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Увійти</a>
        {% endif %}
    </div>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
